<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Incoming Call</title>
  <style>
    * { box-sizing: border-box; }
    
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden; /* Prevents accidental scrolling */
      background-color: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* Background Image setup */
    .bg-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('1774463614783.jpeg') no-repeat center center;
      background-size: cover;
      z-index: 1;
    }

    /* Bottom UI Area */
    .bottom-ui {
      position: absolute;
      bottom: 50px; /* Adjust based on phone chin/home bar */
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
    }

    /* Simple Slider Container */
    .slider-track {
      width: 80%;
      max-width: 300px;
      height: 60px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border-radius: 50px;
      position: relative;
      display: flex;
      align-items: center;
      padding: 5px;
    }

    .slider-handle {
      width: 50px;
      height: 50px;
      background: white;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      position: absolute;
      left: 5px;
      transition: transform 0.1s ease-out;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    .slider-text {
      width: 100%;
      text-align: center;
      color: white;
      font-size: 16px;
      pointer-events: none; /* Let touch pass through to handle */
      opacity: 0.8;
    }

    .icon-phone {
      width: 25px;
      filter: invert(1); /* Makes black icon white */
    }

  </style>
</head>
<body>

  <div class="bg-container"></div>

  <div class="bottom-ui">
    <div class="slider-track" id="track">
      <div class="slider-text">Slide to Answer →</div>
      <div class="slider-handle" id="handle">
        <img src="https://cdn-icons-png.flaticon.com/512/483/483951.png" class="icon-phone" alt="phone">
      </div>
    </div>
  </div>

  <script>
    const handle = document.getElementById('handle');
    const track = document.getElementById('track');
    let isDragging = false;
    let startX = 0;

    // Logic for sliding
    const onStart = (e) => {
      isDragging = true;
      startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
    };

    const onMove = (e) => {
      if (!isDragging) return;
      const currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
      let moveX = currentX - startX;
      
      const maxMove = track.offsetWidth - handle.offsetWidth - 10;
      
      if (moveX < 0) moveX = 0;
      if (moveX > maxMove) moveX = maxMove;
      
      handle.style.transform = translateX(${moveX}px);

      // Trigger navigation if reached 90% of the way
      if (moveX >= maxMove * 0.9) {
        window.location.href = "invite.html";
      }
    };

    const onEnd = () => {
      isDragging = false;
      // Snap back if not fully slid
      handle.style.transition = 'transform 0.3s ease';
      handle.style.transform = 'translateX(0px)';
      setTimeout(() => handle.style.transition = '', 300);
    };

    handle.addEventListener('mousedown', onStart);
    handle.addEventListener('touchstart', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove);
    window.addEventListener('mouseup', onEnd);
    window.addEventListener('touchend', onEnd);
  </script>

</body>
</html>
