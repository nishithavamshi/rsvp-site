<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call</title>

<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  overflow: hidden;
}

.background {
  position: absolute;
  width: 100%;
  height: 100%;
}

.background img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  text-align: center;
  color: white;
  background: rgba(0,0,0,0.25);
}

.top {
  margin-top: 80px;
}

.caller {
  font-size: 28px;
}

.subtext {
  margin-top: 10px;
}

.slider-container {
  width: 280px;
  height: 60px;
  background: rgba(0,0,0,0.4);
  border-radius: 40px;
  position: absolute;
  bottom: calc(80px + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%);
}

.slider-text {
  line-height: 60px;
}

.slider {
  height: 60px;
  width: 60px;
  background: white;
  border-radius: 50%;
  position: absolute;
  left: 0;
  top: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: grab;
}
</style>
</head>

<body>

<div class="background">
  <img src="cover.jpeg">
</div>

<div class="screen">
  <div class="top">
    <div class="caller">💍 Nishi ❤️ Vamshi</div>
    <div class="subtext">Incoming Call...</div>
  </div>

  <div class="slider-container">
    <div class="slider-text">Slide to Answer →</div>
    <div class="slider" id="slider">📞</div>
  </div>
</div>

<script>
const slider = document.getElementById("slider");
const container = document.querySelector(".slider-container");

let isDragging = false;

slider.addEventListener("mousedown", () => isDragging = true);
document.addEventListener("mouseup", () => isDragging = false);

document.addEventListener("mousemove", (e) => {
  if (!isDragging) return;

  let rect = container.getBoundingClientRect();
  let x = e.clientX - rect.left - 30;

  if (x < 0) x = 0;
  if (x > rect.width - 60) x = rect.width - 60;

  slider.style.left = x + "px";

  if (x >= rect.width - 65) {
    window.location.href = "invite.html";
  }
});

// mobile
slider.addEventListener("touchstart", () => isDragging = true);
document.addEventListener("touchend", () => isDragging = false);

document.addEventListener("touchmove", (e) => {
  if (!isDragging) return;

  let rect = container.getBoundingClientRect();
  let x = e.touches[0].clientX - rect.left - 30;

  if (x < 0) x = 0;
  if (x > rect.width - 60) x = rect.width - 60;

  slider.style.left = x + "px";

  if (x >= rect.width - 65) {
    window.location.href = "invite.html";
  }
});
</script>

</body>
</html>
