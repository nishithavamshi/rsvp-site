<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SANGEETH PARTY</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background-color: #fefefe;
      color: #333;
    }

    h1 {
      text-align: center;
      color: #d44;
    }

    form {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input, select, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      background-color: #d44;
      color: #fff;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #b33;
    }
  </style>
</head>

<body>

  <h1>🎉 You're Invited!</h1>
  <p><b>Event:</b> NISHI-VAMSHI SANGEETH</p>
  <p><b>Date:</b> MAY 05, 2026</p>
  <p><b>Venue:</b></p>
<div style="text-align:center; margin:20px 0;">
  <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3336.279873554233!2d-96.99281242410842!3d33.25916457346587!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x864c49ebfc73e627%3A0xee174b4d6eaa08e2!2s4381%20US-377%2C%20Aubrey%2C%20TX%2076227!5e0!3m2!1sen!2sus!4v1774896440993!5m2!1sen!2sus" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
</div>
  <p><b>Attire:</b> Shimmer & Shine</p>

  <!-- FORM -->
  <form action="https://formspree.io/f/mdapkwor" method="POST">

    <!-- Formspree Hidden Fields -->
    <input type="hidden" name="_subject" value="RSVP Submission">
    <input type="hidden" name="_redirect" value="https://nishithavamshi.github.io/rsvp-site/thanks.html">

    <!-- Spam protection -->
    <input type="text" name="_gotcha" style="display:none">

    <label>Your Name:</label>
    <input type="text" name="name" required>

    <label>Will you attend?</label>
    <select name="attending" required>
      <option value="" disabled selected>--Select--</option>
      <option>Yes</option>
      <option>No</option>
    </select>

    <label>No. of guests attending including you?</label>
    <input 
      type="number" 
      name="guests" 
      min="0" 
      max="20" 
      placeholder="Enter number of guests" 
      required
    >

    <label>Meal Preference:</label>
    <select name="meal" required>
      <option value="" disabled selected>--Select--</option>
      <option>Veg</option>
      <option>Non-Veg</option>
    </select>

    <label>Any message or note?</label>
    <textarea name="note" rows="3" placeholder="Write something..."></textarea>

    <button type="submit">Submit RSVP</button>

  </form>

</body>
</html>
