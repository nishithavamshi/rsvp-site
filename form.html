<!DOCTYPE html>
<html>
<head>
<title>RSVP</title>

<style>
body {
  font-family: Arial;
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

form {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}

input, select, textarea, button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
}
</style>
</head>

<body>

<h2>RSVP</h2>

<form action="https://formspree.io/f/mdapkwor" method="POST">

<input type="hidden" name="_subject" value="New RSVP">
<input type="hidden" name="_redirect" value="https://nishithavamshi.github.io/rsvp-site/thanks.html">

<input type="text" name="name" placeholder="Your Name" required>

<select name="attending" required>
<option value="">Will you attend?</option>
<option>Yes</option>
<option>No</option>
</select>

<select name="meal">
<option>Veg</option>
<option>Non-Veg</option>
</select>

<textarea name="message" placeholder="Message"></textarea>

<button type="submit">Submit</button>

</form>

</body>
</html>
