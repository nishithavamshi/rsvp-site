<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitation</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body, html {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }

  /* FULLSCREEN BACKGROUND IMAGE */
  .container {
    position: relative;
    height: 100vh;
    width: 100%;
    background: url('Sangeeth.jpg') no-repeat center center/cover;
  }

  /* BUTTON ON TOP */
  .btn {
    position: absolute;
    top: 5%;
    left: 50%;
    transform: translateX(-50%);
    background: #d44;
    color: white;
    padding: 12px 28px;
    border-radius: 50px;
    text-decoration: none;
    font-size: 16px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }

  /* MOBILE ADJUSTMENTS */
  @media (max-width: 600px) {
    .btn {
      font-size: 14px;
      padding: 10px 20px;
      top: 4%;
    }
  }
</style>
</head>

<body>

<div class="container">
  <a href="form.html" class="btn">Open Invitation 💌</a>
</div>

</body>
</html>
